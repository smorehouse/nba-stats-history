AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: NBA Stats History - Player Z-Score Rankings

Parameters:
  WebImageUri:
    Type: String
    Description: ECR image URI for the web Lambda

Globals:
  Function:
    Timeout: 28

Resources:
  DatabaseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nba-stats-db-${AWS::StackName}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-web
      PackageType: Image
      ImageUri: !Ref WebImageUri
      Environment:
        Variables:
          DB_S3_BUCKET: !Ref DatabaseBucket
          DB_S3_KEY: nba.sqlite
          APP_PASSWORD_SSM: /nba-stats/app-password
          AWS_LWA_ASYNC_INIT: true
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DatabaseBucket
        - SSMParameterReadPolicy:
            ParameterName: nba-stats/app-password
      Events:
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: URL of the web app
    Value: !Sub https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com
  DatabaseBucketName:
    Description: S3 bucket for the SQLite database
    Value: !Ref DatabaseBucket
