AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: NBA Stats History - Player Z-Score Rankings

Parameters:
  WebImageUri:
    Type: String
    Description: ECR image URI for the web Lambda
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for zscore.mascasa.cc

Globals:
  Function:
    Timeout: 28

Resources:
  DatabaseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nba-stats-db-${AWS::StackName}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-web
      PackageType: Image
      ImageUri: !Ref WebImageUri
      Environment:
        Variables:
          DB_S3_BUCKET: !Ref DatabaseBucket
          DB_S3_KEY: nba.sqlite
          AWS_LWA_ASYNC_INIT: true
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DatabaseBucket
      Events:
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  CustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: zscore.mascasa.cc
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: !Ref CustomDomain
      ApiId: !Ref ServerlessHttpApi
      Stage: $default

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z19L3PA4SHN433
      Name: zscore.mascasa.cc
      Type: A
      AliasTarget:
        DNSName: !GetAtt CustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt CustomDomain.RegionalHostedZoneId

Outputs:
  ApiUrl:
    Description: URL of the web app
    Value: !Sub https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com
  DatabaseBucketName:
    Description: S3 bucket for the SQLite database
    Value: !Ref DatabaseBucket
  CustomDomainUrl:
    Description: Custom domain URL
    Value: https://zscore.mascasa.cc
